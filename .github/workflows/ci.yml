name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@7088e561eb65bb68695d245aa206f005ef30921d

      - name: Setup Node
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903
        with:
          node-version: 24

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check workflow hardening
        run: pnpm check:workflows

      - name: Check changesets
        if: github.event_name == 'pull_request' && (github.head_ref != 'changeset-release/main' || github.event.pull_request.head.repo.full_name != 'multiplehats/eve-studio')
        run: pnpm check:changesets

      - name: Lint
        run: pnpm lint

      - name: Check formatting
        run: pnpm format:check

      - name: Test
        run: pnpm test

      - name: Build release artifacts
        run: pnpm build:release

      - name: Build marketing site
        run: pnpm --filter @eve-studio/web build

      - name: Typecheck
        run: pnpm typecheck

      - name: Smoke Studio
        run: pnpm smoke:studio

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Smoke browser
        run: pnpm smoke:browser

      - name: Check release artifacts
        run: pnpm check:release-artifacts
