name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  version-plan:
    name: Build version patch
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
    outputs:
      has_changes: ${{ steps.decide.outputs.has_changes }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@7088e561eb65bb68695d245aa206f005ef30921d

      - name: Setup Node
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903
        with:
          node-version: 24

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check workflow hardening
        run: pnpm check:workflows

      - name: Apply Changesets versioning
        run: pnpm changeset:version

      - name: Decide whether version PR is needed
        id: decide
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            git diff --binary > changeset-version.patch
          fi

      - name: Upload version patch
        if: steps.decide.outputs.has_changes == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: changeset-version-patch
          path: changeset-version.patch
          if-no-files-found: error

  version-pr:
    name: Open version PR
    needs: version-plan
    if: needs.version-plan.outputs.has_changes == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Download version patch
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: changeset-version-patch

      - name: Create or update version PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          branch="changeset-release/main"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$branch"
          git apply changeset-version.patch
          git add .changeset package.json pnpm-lock.yaml packages/studio/package.json packages/studio/CHANGELOG.md packages/extension/package.json packages/extension/CHANGELOG.md
          git commit -m "chore: version packages"
          git push --force-with-lease origin "$branch"
          existing="$(gh pr list --head "$branch" --base main --json number --jq '.[0].number')"
          if [ -n "$existing" ]; then
            gh pr edit "$existing" --title "chore: version packages" --body "This PR was generated by Changesets. Merge it to publish the next npm release."
          else
            gh pr create --head "$branch" --base main --title "chore: version packages" --body "This PR was generated by Changesets. Merge it to publish the next npm release."
          fi

  build-pack:
    name: Build and pack release
    needs: version-plan
    if: needs.version-plan.outputs.has_changes == 'false'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
    outputs:
      has_publishable_tarballs: ${{ steps.eligibility.outputs.has_publishable_tarballs }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@7088e561eb65bb68695d245aa206f005ef30921d

      - name: Setup Node
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903
        with:
          node-version: 24

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check workflow hardening
        run: pnpm check:workflows

      - name: Test
        run: pnpm test

      - name: Build release artifacts
        run: pnpm build:release

      - name: Typecheck
        run: pnpm typecheck

      - name: Pack and inspect release tarballs
        run: pnpm check:release-artifacts

      - name: Select unpublished release tarballs
        id: eligibility
        run: |
          set -euo pipefail
          rm -rf publish-artifacts
          mkdir publish-artifacts
          while IFS='  ' read -r checksum tarball; do
            case "$tarball" in
              ""|*/*|*\\*|*..*|*[!A-Za-z0-9._@+-]*)
                exit 1
                ;;
            esac
            case "$tarball" in
              *.tgz)
                spec="$(tar -xOf "release-artifacts/$tarball" package/package.json | node -e 'let source=""; process.stdin.setEncoding("utf8"); process.stdin.on("data", (chunk) => { source += chunk; }); process.stdin.on("end", () => { const manifest = JSON.parse(source); if (typeof manifest.name !== "string" || typeof manifest.version !== "string") process.exit(1); process.stdout.write(manifest.name + "@" + manifest.version); });')"
                if npm view "$spec" version >/dev/null 2>&1; then
                  echo "$spec is already published; skipping"
                else
                  printf '%s  %s\n' "$checksum" "$tarball" >> publish-artifacts/SHA256SUMS
                  cp "release-artifacts/$tarball" "publish-artifacts/$tarball"
                fi
                ;;
              *)
                exit 1
                ;;
            esac
          done < release-artifacts/SHA256SUMS
          if [ -s publish-artifacts/SHA256SUMS ]; then
            (cd publish-artifacts && sha256sum -c SHA256SUMS)
            echo "has_publishable_tarballs=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_publishable_tarballs=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload release tarballs
        if: steps.eligibility.outputs.has_publishable_tarballs == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: npm-release-artifacts
          path: publish-artifacts/
          if-no-files-found: error

  publish:
    name: Publish
    needs: build-pack
    if: needs.build-pack.outputs.has_publishable_tarballs == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment: npm-publish
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Setup Node
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Download release tarballs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: npm-release-artifacts
          path: release-artifacts

      - name: Verify checksums
        run: cd release-artifacts && sha256sum -c SHA256SUMS

      - name: Publish exact tarballs
        run: |
          while IFS='  ' read -r checksum tarball; do
            case "$tarball" in
              ""|*/*|*\\*|*..*|*[!A-Za-z0-9._@+-]*)
                exit 1
                ;;
            esac
            case "$tarball" in
              *.tgz)
                npm publish "release-artifacts/$tarball" --provenance --ignore-scripts
                ;;
              *)
                exit 1
                ;;
            esac
          done < release-artifacts/SHA256SUMS
